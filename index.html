async function sendWhatsApp(message) {
  try {
    const formData = new FormData();
    formData.append("target", NOTIFY_NUMBER);
    formData.append("message", message);
    formData.append("countryCode", "60");
    formData.append("mentions", MENTION_NUMBERS.join(","));

      method: "POST",
      headers: { "Authorization": FONNTE_TOKEN },

async function loadAll() {
  const { data: staffData } = await sb.from("staff").select("*").eq("active", true).order("name");
  state.staff = staffData || [];
  const [inv, loans, log] = await Promise.all([
    sb.from("inventory").select("*").order("description"),
    sb.from("loans").select("*, loan_sets(*), loan_photos(*)").order("created_at", {ascending:false}),
    sb.from("activity_log").select("*").order("created_at", {ascending:false}).limit(50),
  ]);
  state.inventory = (inv.data||[]).map(i=>({
    setNumber:i.set_number, description:i.description, brand:i.brand, sn:i.sn||"",
    location:i.location||"", remark:i.remark||"", dbId:i.id,
    availability:i.availability||"Available",
    consignmentHospital:i.consignment_hospital||"", consignmentSince:i.consignment_since||"",
    rectifiedBy:i.rectified_by||"", rectifiedAt:i.rectified_at||""
  }));
  state.loans = (loans.data||[]).map(l=>({
    id:l.id, loanNumber:l.loan_number||0, hospital:l.hospital, surgeon:l.surgeon, pic:l.pic||"",
    borrowDate:l.borrow_date, returnDate:l.return_date||"", status:l.status, caseNote:l.case_note||"",
    sets:(l.loan_sets||[]).map(s=>({setNumber:s.set_number,description:s.description||"",brand:s.brand||"",sn:s.sn||"",condition:s.condition||"Good"})),
    photos:(l.loan_photos||[]).map(p=>({dataUrl:p.photo_url,ts:p.taken_at||""})),
  }));
  state.activityLog = (log.data||[]).map(e=>({
    id:e.id, ts:new Date(e.created_at).toLocaleString("en-MY"),
    action:e.action, hospital:e.hospital||"", surgeon:e.surgeon||"",
    sets:e.set_numbers||"", count:e.set_count||0, hasPhoto:e.has_photo||false
  }));
  state.loading = false;
  render();
}

async function saveLoan() {
  state.saving = true; render();
  const valid = state.form.sets.filter(s=>s.setNumber);
  if (!valid.length||!state.form.hospital||!state.form.surgeon||!state.form.borrowDate) {
    toast("Fill: Hospital, Surgeon, Date & at least 1 set"); state.saving=false; render(); return;
  }
  if (!state.editId && (!state.form.photos || state.form.photos.length === 0)) {
    toast("📷 Photo evidence is required!"); state.saving=false; render(); return;
  }
  const setNums = valid.map(s=>s.setNumber);
  const uniqueNums = [...new Set(setNums)];
  if (setNums.length !== uniqueNums.length) {
    const dupes = setNums.filter((s,idx)=>setNums.indexOf(s)!==idx);
    toast("⚠️ Duplicate sets: "+[...new Set(dupes)].join(", "));
    state.saving=false; render(); return;
  }
  const missingFromInv = setNums.filter(sn=>!state.inventory.find(i=>i.setNumber===sn));
  if (missingFromInv.length>0) {
    toast("⚠️ Sets not in inventory: "+missingFromInv.join(", "));
    state.saving=false; render(); return;
  }
  try {
    let loanId = state.editId;
    if (state.editId) {
      await sb.from("loans").update({ hospital:state.form.hospital, surgeon:state.form.surgeon, pic:state.form.pic, borrow_date:state.form.borrowDate, return_date:state.form.returnDate||null, status:state.form.status, case_note:state.form.caseNote }).eq("id", state.editId);
      await sb.from("loan_sets").delete().eq("loan_id", state.editId);
      await sb.from("loan_photos").delete().eq("loan_id", state.editId);
    } else {
      const loanCount = state.loans.length + 1;
      const { data } = await sb.from("loans").insert({ hospital:state.form.hospital, surgeon:state.form.surgeon, pic:state.form.pic, borrow_date:state.form.borrowDate, return_date:state.form.returnDate||null, status:state.form.status, case_note:state.form.caseNote, loan_number:loanCount }).select().single();
      loanId = data.id;
    }
    if (valid.length) await sb.from("loan_sets").insert(valid.map(s=>({ loan_id:loanId, set_number:s.setNumber, description:s.description, brand:s.brand, sn:s.sn, condition:s.condition })));
    if (state.form.photos.length) await sb.from("loan_photos").insert(state.form.photos.map(p=>({ loan_id:loanId, photo_url:p.dataUrl, taken_at:p.ts })));
    await sb.from("activity_log").insert({ action:state.editId?"Updated":"Loaned Out", hospital:state.form.hospital, surgeon:state.form.surgeon, pic:state.form.pic, set_numbers:valid.map(s=>s.setNumber).join(", "), set_count:valid.length, has_photo:state.form.photos.length>0 });
    if (!state.editId) {
      await Promise.all(valid.map(s => sb.from("inventory").update({availability:"Out"}).eq("set_number", s.setNumber)));
    }
    toast(state.editId?"✅ Loan updated!":"✅ Loan saved!");
    const f2 = state.form;
    const setList = valid.map(s=>s.setNumber).join(", ");
    if (!state.editId) {
      const msg = `🦴 *SPINE LOAN TRACKER*\
📤 *New Loan Created*\
\
🏥 Hospital: ${f2.hospital}\
👨‍⚕️ Surgeon: ${f2.surgeon}\
👤 PIC: ${f2.pic||"-"}\
📅 Out: ${f2.borrowDate}\
🔄 Due: ${f2.returnDate||"-"}\
📦 Sets (${valid.length}): ${setList}\
📝 Note: ${f2.caseNote||"-"}\
📷 Photos: ${f2.photos.length} attached`;
      sendWhatsApp(msg);
    } else {
      const msg = `🦴 *SPINE LOAN TRACKER*\
✏️ *Loan Updated*\
\
🏥 Hospital: ${f2.hospital}\
👨‍⚕️ Surgeon: ${f2.surgeon}\
📦 Sets: ${setList}`;
      sendWhatsApp(msg);
    }
    state.showForm=false; state.editId=null; state.form=emptyForm();
    await loadAll();
  } catch(e) { toast("❌ Error saving: "+e.message); state.saving=false; render(); }
}

async function returnLoan(id, returnPhotos, conditions, returnNote, returnParkHospitals, actualReturnDate) {
  const loan = state.loans.find(l=>l.id===id);
  const returnDate = actualReturnDate || new Date().toISOString().split("T")[0];

  await sb.from("loans").update({
    status:"Returned",
    return_date: returnDate,
    case_note: (loan.caseNote||"") + (returnNote ? " | Return note: "+returnNote : "")
  }).eq("id",id);

  if (conditions) {
    for (const set of loan.sets) {
      const cond = conditions[set.setNumber];
      if (!cond || cond === "Out") continue; // skip unresolved (shouldn't reach here after validation)

      await sb.from("loan_sets").update({condition: cond}).eq("loan_id", id).eq("set_number", set.setNumber);

      const newAvail = cond === "Available" ? "Available"
                     : cond === "Parked"    ? "Parked"
                     : cond === "Repeat"    ? "Repeat"
                     :                        "Quarantine";

      const parkHosp = (returnParkHospitals && returnParkHospitals[set.setNumber]) || null;
      const returnUpdateData = {
        availability: newAvail,
        consignment_hospital: newAvail==="Parked" ? parkHosp : null,
        consignment_since:    newAvail==="Parked" ? new Date().toISOString().split("T")[0] : null,
      };
      if (newAvail === "Parked" && parkHosp) returnUpdateData.location = parkHosp;
      if (newAvail === "Available") {
        returnUpdateData.consignment_hospital = null;
        returnUpdateData.consignment_since = null;
      }
      if (newAvail === "Quarantine" && returnParkHospitals) {
        const reason = returnParkHospitals["qr_"+set.setNumber] || "";
        if (reason) returnUpdateData.remark = "⚠️ Quarantine: "+reason;
      }
      await sb.from("inventory").update(returnUpdateData).eq("set_number", set.setNumber);
    }
  }

  if (returnPhotos && returnPhotos.length > 0) {
    await sb.from("loan_photos").insert(returnPhotos.map(p=>({ loan_id:id, photo_url:p.dataUrl, taken_at:"RETURN: "+p.ts })));
  }

  await sb.from("activity_log").insert({
    action:"Returned", hospital:loan.hospital, surgeon:loan.surgeon,
    set_numbers:loan.sets.map(s=>s.setNumber).join(", "),
    set_count:loan.sets.length, has_photo:(returnPhotos||[]).length>0
  });

  const condSummary = conditions ? Object.entries(conditions)
    .filter(([,v])=>v && v!=="Out")
    .map(([k,v])=>{
      const reason = returnParkHospitals&&returnParkHospitals["qr_"+k] ? " ("+returnParkHospitals["qr_"+k]+")" : "";
      return `${k}: ${v}${reason}`;
    }).join(", ") : "";

  const msg2 = `🦴 *SPINE LOAN TRACKER*\
✅ *Sets Returned*\
\
🏥 Hospital: ${loan.hospital}\
👨‍⚕️ Surgeon: ${loan.surgeon}\
👤 Staff: ${state.returnModal?.staffName||"-"}\
📦 Sets (${loan.sets.length}): ${loan.sets.map(s=>s.setNumber).join(", ")}${condSummary?"\
🔍 Status: "+condSummary:""}${returnNote?"\
📝 Note: "+returnNote:""}\
📷 Return photos: ${(returnPhotos||[]).length}`;
  sendWhatsApp(msg2);

  toast("✅ Marked as returned!");
  state.returnModal = null;
  await loadAll();
}

async function deleteLoan(id) {
  const loan = state.loans.find(l=>l.id===id);
  await sb.from("loans").delete().eq("id",id);
  await sb.from("activity_log").insert({ action:"Deleted", hospital:loan.hospital, surgeon:loan.surgeon, set_numbers:loan.sets.map(s=>s.setNumber).join(", "), set_count:loan.sets.length });
  const msg3 = `🦴 *SPINE LOAN TRACKER*\
🗑️ *Loan Record Deleted*\
\
🏥 Hospital: ${loan.hospital}\
👨‍⚕️ Surgeon: ${loan.surgeon}\
📦 Sets: ${loan.sets.map(s=>s.setNumber).join(", ")}`;
  sendWhatsApp(msg3);
  toast("🗑️ Loan deleted"); await loadAll();
}

async function saveInvItem(forceAvailable) {
  const f = state.invForm;
  if (!f.setNumber||!f.description||!f.brand) { toast("Fill Set Number, Description, Brand"); return; }
  if (state.invEditKey) {
    const existing = state.inventory.find(i=>i.setNumber===state.invEditKey);
    const isQuarantine = existing && existing.availability === "Quarantine";
    const snChanged = existing && existing.sn !== f.sn && f.sn.trim() !== "";

    if (isQuarantine && forceAvailable === undefined) {
      state.repairModal = { updatedForm:{...f}, oldSn:existing.sn, newSn:f.sn, snChanged };
      render(); return;
    }

    const finalAvail = forceAvailable ? "Available" : (f.availability||"Available");
    if (f.setNumber !== state.invEditKey) {
      await sb.from("inventory").delete().eq("set_number", state.invEditKey);
      await sb.from("inventory").insert({
        set_number:f.setNumber, description:f.description, brand:f.brand, sn:f.sn,
        location:f.location, remark:forceAvailable?"":f.remark, availability:finalAvail,
        consignment_hospital:f.consignmentHospital||null, consignment_since:f.consignmentSince||null,
        rectified_by:forceAvailable?"Management":null, rectified_at:forceAvailable?new Date().toISOString():null
      });
    } else {
      await sb.from("inventory").update({
        description:f.description, brand:f.brand, sn:f.sn, location:f.location,
        remark:forceAvailable?"":f.remark, availability:finalAvail,
        consignment_hospital:f.consignmentHospital||null, consignment_since:f.consignmentSince||null,
        rectified_by:forceAvailable?"Management":null, rectified_at:forceAvailable?new Date().toISOString():null
      }).eq("set_number", state.invEditKey);
    }

    if (forceAvailable) {
      await sb.from("activity_log").insert({
        action:"Status Change", hospital:"-", surgeon:"Management", pic:"Management",
        set_numbers:`${state.invEditKey}: 🟢 Available (S/N updated: ${f.sn})`,
        set_count:1, has_photo:false
      });
    }
    toast(forceAvailable?"✅ Set repaired & marked Available!":"✅ Item updated!");
  } else {
    const exists = state.inventory.find(i=>i.setNumber===f.setNumber);
    if (exists) { toast("❌ Set Number already exists!"); return; }
    await sb.from("inventory").insert({
      set_number:f.setNumber, description:f.description, brand:f.brand, sn:f.sn,
      location:f.location, remark:f.remark, availability:f.availability||"Available",
      consignment_hospital:f.consignmentHospital||null, consignment_since:f.consignmentSince||null
    });
    toast("✅ Item added to inventory!");
  }
  state.showInvForm=false; state.invEditKey=null; state.invForm=emptyInv(); state.repairModal=null;
  await loadAll();
}

async function deleteInvItem(setNumber) {
  if (!confirm(`Delete "${setNumber}" from inventory?`)) return;
  await sb.from("inventory").delete().eq("set_number", setNumber);
  toast("🗑️ Item removed"); await loadAll();
}

function compressPhoto(file,callback) {
  const MAX_WIDTH=1024,MAX_HEIGHT=1024,QUALITY=0.7;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>MAX_WIDTH){h=Math.round(h*MAX_WIDTH/w);w=MAX_WIDTH;}
      if(h>MAX_HEIGHT){w=Math.round(w*MAX_HEIGHT/h);h=MAX_HEIGHT;}
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL("image/jpeg",QUALITY);
      const compressedKB=Math.round(compressed.length*0.75/1024);
      callback(compressed,Math.round(file.size/1024),compressedKB);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handlePhoto(event) {
  Array.from(event.target.files).forEach(file=>{
    compressPhoto(file,(dataUrl,orig,compressedKB)=>{
      state.form.photos.push({dataUrl,name:file.name,ts:new Date().toLocaleTimeString("en-MY"),compressedKB});

  });
}

function submitReturn() {
  const r=state.returnModal;
  if(!r.photos||r.photos.length===0){
    toast("📷 Photo required before confirming!");
    return;
  }
  // Validate all non-locked sets have a resolved status
  const unresolved=r.loan.sets.filter(s=>{
    const inv=state.inventory.find(i=>i.setNumber===s.setNumber);
    const isAlreadyAvailable=(inv?.availability||"Available")==="Available";
    return !isAlreadyAvailable&&(!r.conditions[s.setNumber]||r.conditions[s.setNumber]==="Out");
  });
  if(unresolved.length>0){
    toast(`⚠️ Assign status to: ${unresolved.map(s=>s.setNumber).join(", ")}`);
    return;
  }
  const combined={...r.parkHospitals};
  if(r.quarantineReasons){
    Object.entries(r.quarantineReasons).forEach(([k,v])=>{combined["qr_"+k]=v;});
  }
  const dateEl=document.getElementById("returnDateInput");
  const returnDate=dateEl?dateEl.value:r.returnDate;
  returnLoan(r.loanId,r.photos,r.conditions,r.note,combined,returnDate);
}

  const rows=actLogs.map(e=>[e.ts,e.action,e.hospital,e.surgeon,e.surgeon,e.sets,e.count,e.hasPhoto?"Yes":"No"]);
  const csv=[h,...rows].map(r=>r.map(c=>'"'+(c||"")+'"').join(",")).join("\
");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`ActivityLog_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();toast("📥 Activity log exported!");
}

// ── STAFF MODAL ──────────────────────────────────────────
function reqStaffAction(action,fn) {
  state.staffModal={action,fn,name:"",password:"",error:""};
  render();
  setTimeout(()=>document.getElementById("staffNameSel")?.focus(),50);
}

// FIX: name now tracked reactively via onchange; no DOM read fallback needed
async function submitStaffModal() {
  const sm=state.staffModal;
  // Still read DOM as fallback in case onchange missed
  const nameEl=document.getElementById("staffNameSel");
  const passEl=document.getElementById("staffPassInput");
  if(nameEl&&nameEl.value)sm.name=nameEl.value;
  if(passEl&&passEl.value)sm.password=passEl.value;

  if(!sm.name){sm.error="Please select your name";render();return;}
  if(!sm.password){sm.error="Please enter your password";render();return;}

  const staff=state.staff.find(s=>s.name===sm.name);
  if(!staff){sm.error="Staff not found";render();return;}
  if(staff.password!==sm.password){sm.error="Wrong password. Try again.";sm.password="";render();return;}

  const fn=sm.fn;
  const staffName=sm.name;
  state.staffModal=null;
  fn(staffName);
}

function showChangePassword() {
  state.staffModal=null;
  state.changePwModal={name:"",oldPass:"",newPass:"",confPass:"",error:"",success:""};
  render();
}

async function submitChangePassword() {
  const cp=state.changePwModal;
  const nameEl=document.getElementById("cpNameSel");
  const oldEl=document.getElementById("cpOldPass");
  const newEl=document.getElementById("cpNewPass");
  const confEl=document.getElementById("cpConfPass");
  if(nameEl&&nameEl.value)cp.name=nameEl.value;
  if(oldEl&&oldEl.value)cp.oldPass=oldEl.value;
  if(newEl&&newEl.value)cp.newPass=newEl.value;
  if(confEl&&confEl.value)cp.confPass=confEl.value;

  if(!cp.name){cp.error="Please select your name";render();return;}
  if(!cp.oldPass){cp.error="Please enter your current password";render();return;}
  if(!cp.newPass){cp.error="Please enter a new password";render();return;}
  if(cp.newPass.length<4){cp.error="New password must be at least 4 characters";render();return;}
  if(cp.newPass!==cp.confPass){cp.error="New passwords do not match";render();return;}

  const staff=state.staff.find(s=>s.name===cp.name);
  if(!staff){cp.error="Staff not found";render();return;}
  if(staff.password!==cp.oldPass){cp.error="Current password is wrong";render();return;}

  await sb.from("staff").update({password:cp.newPass}).eq("name",cp.name);
  state.staff=state.staff.map(s=>s.name===cp.name?{...s,password:cp.newPass}:s);
  cp.error="";cp.success="Password changed successfully!";
  cp.oldPass="";cp.newPass="";cp.confPass="";
  render();
  setTimeout(()=>{state.changePwModal=null;render();},2000);
}

// ── LOAN BULK SELECT / DELETE ────────────────────────────
function toggleLoanSelectMode() { state.selectLoanMode=!state.selectLoanMode; state.selectedLoans=[]; render(); }
function toggleSelectAllLoans() {
  const ids=filteredLoansCache.map(l=>l.id);
  state.selectedLoans = state.selectedLoans.length===ids.length ? [] : [...ids];
  render();
}
function toggleLoanSelect(id) {
  if(state.selectedLoans.includes(id)){ state.selectedLoans=state.selectedLoans.filter(x=>x!==id); }
  else { state.selectedLoans.push(id); }
  render();
}
async function doDeleteSelectedLoans() {
  const ids=[...state.selectedLoans];
  for(const id of ids){
    const loan=state.loans.find(l=>l.id===id);
    if(!loan) continue;
    await sb.from("loans").delete().eq("id",id);
    await sb.from("activity_log").insert({action:"Deleted",hospital:loan.hospital,surgeon:loan.surgeon,set_numbers:loan.sets.map(s=>s.setNumber).join(", "),set_count:loan.sets.length});
  }
  state.selectedLoans=[]; state.selectLoanMode=false;
  toast(ids.length+" loan(s) deleted!");
  await loadAll();
}
function reqDeleteSelectedLoans() {
  if(state.selectedLoans.length===0){ toast("Select loans first"); return; }
  state.modal={type:"delete",customPassword:"admin123",fn:()=>doDeleteSelectedLoans(),input:"",error:""};
  render();
}
