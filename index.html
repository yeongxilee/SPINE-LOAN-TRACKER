async function sendWhatsApp(message) {
  try {
    const formData = new FormData();
    formData.append("target", NOTIFY_NUMBER);
    formData.append("message", message);
    formData.append("countryCode", "60");
    await fetch("https://api.fonnte.com/send", {
      method: "POST",
      headers: { "Authorization": FONNTE_TOKEN },
      body: formData
    });
  } catch(e) { console.log("WhatsApp notification failed:", e.message); }
}

// ── TOAST ───────────────────────────────────────────────

// ── SUPABASE HELPERS ────────────────────────────────────
async function loadAll() {
  const [inv, loans, log] = await Promise.all([
    sb.from("inventory").select("*").order("description"),
    sb.from("loans").select("*, loan_sets(*), loan_photos(*)").order("created_at", {ascending:false}),
    sb.from("activity_log").select("*").order("created_at", {ascending:false}).limit(50),
  ]);
  state.inventory = (inv.data||[]).map(i=>({ setNumber:i.set_number, description:i.description, brand:i.brand, sn:i.sn||"", location:i.location||"", remark:i.remark||"", dbId:i.id, availability:i.availability||"Available", consignmentHospital:i.consignment_hospital||"", consignmentSince:i.consignment_since||"", rectifiedBy:i.rectified_by||"", rectifiedAt:i.rectified_at||"" }));
  state.loans = (loans.data||[]).map(l=>({
    id: l.id, loanNumber:l.loan_number||0, hospital:l.hospital, surgeon:l.surgeon, pic:l.pic||"", borrowDate:l.borrow_date, returnDate:l.return_date||"",
    status:l.status, caseNote:l.case_note||"",
    sets: (l.loan_sets||[]).map(s=>({setNumber:s.set_number,description:s.description||"",brand:s.brand||"",sn:s.sn||"",condition:s.condition||"Good"})),
    photos: (l.loan_photos||[]).map(p=>({dataUrl:p.photo_url, ts:p.taken_at||""})),
  }));
  state.activityLog = (log.data||[]).map(e=>({ id:e.id, ts:new Date(e.created_at).toLocaleString("en-MY"), action:e.action, hospital:e.hospital||"", surgeon:e.surgeon||"", sets:e.set_numbers||"", count:e.set_count||0, hasPhoto:e.has_photo||false }));
  state.loading = false;
  render();
}

async function saveLoan() {
  state.saving = true; render();
  const valid = state.form.sets.filter(s=>s.setNumber);
  if (!valid.length||!state.form.hospital||!state.form.surgeon||!state.form.borrowDate) {
    toast("Fill: Hospital, Surgeon, Date & at least 1 set"); state.saving=false; render(); return;
  }
  // Check for duplicate sets
  const setNums = valid.map(s=>s.setNumber);
  const uniqueNums = [...new Set(setNums)];
  if (setNums.length !== uniqueNums.length) {
    const dupes = setNums.filter((s,idx)=>setNums.indexOf(s)!==idx);
    toast("⚠️ Duplicate sets: "+[...new Set(dupes)].join(", ")+" — please remove duplicates!");
    state.saving=false; render(); return;
  }
  // Check all sets exist in inventory
  const missingFromInv = setNums.filter(sn=>!state.inventory.find(i=>i.setNumber===sn));
  if (missingFromInv.length>0) {
    toast("⚠️ Sets not found in inventory: "+missingFromInv.join(", ")+" — please add them to inventory first!");
    state.saving=false; render(); return;
  }
  try {
    let loanId = state.editId;
    if (state.editId) {
      await sb.from("loans").update({ hospital:state.form.hospital, surgeon:state.form.surgeon, pic:state.form.pic, borrow_date:state.form.borrowDate, return_date:state.form.returnDate||null, status:state.form.status, case_note:state.form.caseNote }).eq("id", state.editId);
      await sb.from("loan_sets").delete().eq("loan_id", state.editId);
      await sb.from("loan_photos").delete().eq("loan_id", state.editId);
    } else {
      const loanCount = state.loans.length + 1;
      const { data } = await sb.from("loans").insert({ hospital:state.form.hospital, surgeon:state.form.surgeon, pic:state.form.pic, borrow_date:state.form.borrowDate, return_date:state.form.returnDate||null, status:state.form.status, case_note:state.form.caseNote, loan_number:loanCount }).select().single();
      loanId = data.id;
    }
    if (valid.length) await sb.from("loan_sets").insert(valid.map(s=>({ loan_id:loanId, set_number:s.setNumber, description:s.description, brand:s.brand, sn:s.sn, condition:s.condition })));
    if (state.form.photos.length) await sb.from("loan_photos").insert(state.form.photos.map(p=>({ loan_id:loanId, photo_url:p.dataUrl, taken_at:p.ts })));
    await sb.from("activity_log").insert({ action:state.editId?"Updated":"Loaned Out", hospital:state.form.hospital, surgeon:state.form.surgeon, pic:state.form.pic, set_numbers:valid.map(s=>s.setNumber).join(", "), set_count:valid.length, has_photo:state.form.photos.length>0 });
    // Update inventory availability
    if (!state.editId) {
      for (const s of valid) {
        await sb.from("inventory").update({availability:"Out"}).eq("set_number", s.setNumber);
      }
    }
    toast(state.editId?"✅ Loan updated!":"✅ Loan saved!");
    const f2 = state.form;
    const setList = valid.map(s=>s.setNumber).join(", ");
    if (!state.editId) {
      const msg = `🦴 *SPINE LOAN TRACKER*\n📤 *New Loan Created*\n\n🏥 Hospital: ${f2.hospital}\n👨‍⚕️ Surgeon: ${f2.surgeon}\n👤 PIC: ${f2.pic||"-"}\n📅 Out: ${f2.borrowDate}\n🔄 Due: ${f2.returnDate||"-"}\n📦 Sets (${valid.length}): ${setList}\n📝 Note: ${f2.caseNote||"-"}\n📷 Photos: ${f2.photos.length} attached`;
      sendWhatsApp(msg);
    } else {
      const msg = `🦴 *SPINE LOAN TRACKER*\n✏️ *Loan Updated*\n\n🏥 Hospital: ${f2.hospital}\n👨‍⚕️ Surgeon: ${f2.surgeon}\n📦 Sets: ${setList}`;
      sendWhatsApp(msg);
    }
    state.showForm=false; state.editId=null; state.form=emptyForm();
    await loadAll();
  } catch(e) { toast("❌ Error saving: "+e.message); state.saving=false; render(); }
}

async function returnLoan(id, returnPhotos, conditions, returnNote, returnParkHospitals) {
  const loan = state.loans.find(l=>l.id===id);
  // Update status and return note
  await sb.from("loans").update({status:"Returned", case_note: (loan.caseNote||"") + (returnNote ? " | Return note: "+returnNote : "")}).eq("id",id);
  // Update each set condition on return and set availability
  if (conditions) {
    for (const set of loan.sets) {
      if (conditions[set.setNumber]) {
        const cond = conditions[set.setNumber];
        await sb.from("loan_sets").update({condition: cond}).eq("loan_id", id).eq("set_number", set.setNumber);
        // If Good → Available, if Damaged/Quarantine → Quarantine (needs fixing)
        // Map return status directly to inventory availability
        const newAvail = cond === "Available" ? "Available" : cond === "Parked" ? "Parked" : "Quarantine";
        const parkHosp = (returnParkHospitals && returnParkHospitals[set.setNumber]) || null;
        const returnUpdateData = {
          availability: newAvail,
          consignment_hospital: newAvail==="Parked" ? parkHosp : null,
          consignment_since: newAvail==="Parked" ? new Date().toISOString().split("T")[0] : null
        };
        // Sync location field when parked on return
        if (newAvail === "Parked" && parkHosp) {
          returnUpdateData.location = parkHosp;
        }
        if (newAvail === "Available") {
          returnUpdateData.consignment_hospital = null;
          returnUpdateData.consignment_since = null;
        }
        // Save quarantine reason to remark
        if (newAvail === "Quarantine" && returnParkHospitals) {
          const reason = (returnParkHospitals["qr_"+set.setNumber]) || "";
          if (reason) returnUpdateData.remark = "⚠️ Quarantine: "+reason;
        }
        await sb.from("inventory").update(returnUpdateData).eq("set_number", set.setNumber);
      }
    }
  }
  // Save return photos
  if (returnPhotos && returnPhotos.length > 0) {
    await sb.from("loan_photos").insert(returnPhotos.map(p=>({ loan_id:id, photo_url:p.dataUrl, taken_at:"RETURN: "+p.ts })));
  }
  await sb.from("activity_log").insert({ action:"Returned", hospital:loan.hospital, surgeon:loan.surgeon, set_numbers:loan.sets.map(s=>s.setNumber).join(", "), set_count:loan.sets.length, has_photo:(returnPhotos||[]).length>0 });
  const condSummary = conditions ? Object.entries(conditions).map(([k,v])=>{
    const reason = returnParkHospitals&&returnParkHospitals["qr_"+k] ? " ("+returnParkHospitals["qr_"+k]+")" : "";
    return `${k}: ${v}${reason}`;
  }).join(", ") : "";
  const msg2 = `🦴 *SPINE LOAN TRACKER*\n✅ *Sets Returned*\n\n🏥 Hospital: ${loan.hospital}\n👨‍⚕️ Surgeon: ${loan.surgeon}\n📦 Sets (${loan.sets.length}): ${loan.sets.map(s=>s.setNumber).join(", ")}${condSummary?"\n🔍 Condition: "+condSummary:""}${returnNote?"\n📝 Note: "+returnNote:""}\n📷 Return photos: ${(returnPhotos||[]).length}`;
  sendWhatsApp(msg2);
  toast("✅ Marked as returned!"); 
  state.returnModal = null;
  await loadAll();
}

async function deleteLoan(id) {
  const loan = state.loans.find(l=>l.id===id);
  await sb.from("loans").delete().eq("id",id);
  await sb.from("activity_log").insert({ action:"Deleted", hospital:loan.hospital, surgeon:loan.surgeon, set_numbers:loan.sets.map(s=>s.setNumber).join(", "), set_count:loan.sets.length });
  const msg3 = `🦴 *SPINE LOAN TRACKER*\n🗑️ *Loan Record Deleted*\n\n🏥 Hospital: ${loan.hospital}\n👨‍⚕️ Surgeon: ${loan.surgeon}\n📦 Sets: ${loan.sets.map(s=>s.setNumber).join(", ")}`;
  sendWhatsApp(msg3);
  toast("🗑️ Loan deleted"); await loadAll();
}

async function saveInvItem(forceAvailable) {
  const f = state.invForm;
  if (!f.setNumber||!f.description||!f.brand) { toast("Fill Set Number, Description, Brand"); return; }
  if (state.invEditKey) {
    // Always show repair confirm modal when editing a Quarantine set
    const existing = state.inventory.find(i=>i.setNumber===state.invEditKey);
    const isQuarantine = existing && existing.availability === "Quarantine";
    const snChanged = existing && existing.sn !== f.sn && f.sn.trim() !== "";

    if (isQuarantine && !forceAvailable && forceAvailable !== false) {
      // Show repair confirm modal
      state.repairModal = {
        updatedForm: {...f},
        oldSn: existing.sn,
        newSn: f.sn,
        snChanged: snChanged
      };
      render();
      return;
    }

    const finalAvail = forceAvailable ? "Available" : (f.availability||"Available");
    if (f.setNumber !== state.invEditKey) {
      // Set number changed — delete old and insert new
      await sb.from("inventory").delete().eq("set_number", state.invEditKey);
      await sb.from("inventory").insert({
        set_number: f.setNumber,
        description:f.description, brand:f.brand, sn:f.sn, location:f.location,
        remark: forceAvailable ? "" : f.remark,
        availability: finalAvail,
        consignment_hospital: f.consignmentHospital||null,
        consignment_since: f.consignmentSince||null,
        rectified_by: forceAvailable ? "Management" : null,
        rectified_at: forceAvailable ? new Date().toISOString() : null
      });
    } else {
      await sb.from("inventory").update({
        description:f.description, brand:f.brand, sn:f.sn, location:f.location,
        remark: forceAvailable ? "" : f.remark,
        availability: finalAvail,
        consignment_hospital: f.consignmentHospital||null,
        consignment_since: f.consignmentSince||null,
        rectified_by: forceAvailable ? "Management" : null,
        rectified_at: forceAvailable ? new Date().toISOString() : null
      }).eq("set_number", state.invEditKey);
    }

    if (forceAvailable) {
      await sb.from("activity_log").insert({
        action: "Status Change",
        hospital: "-",
        surgeon: "Management",
        pic: "Management",
        set_numbers: `${state.invEditKey}: 🟢 Available (S/N updated: ${f.sn})`,
        set_count: 1,
        has_photo: false
      });
    }
    toast(forceAvailable ? "✅ Set repaired & marked Available!" : "✅ Item updated!");
  } else {
    const exists = state.inventory.find(i=>i.setNumber===f.setNumber);
    if (exists) { toast("❌ Set Number already exists!"); return; }
    await sb.from("inventory").insert({
      set_number:f.setNumber, description:f.description, brand:f.brand, sn:f.sn,
      location:f.location, remark:f.remark, availability:f.availability||"Available",
      consignment_hospital:f.consignmentHospital||null, consignment_since:f.consignmentSince||null
    });
    toast("✅ Item added to inventory!");
  }
  state.showInvForm=false; state.invEditKey=null; state.invForm=emptyInv();
  state.repairModal=null;
  await loadAll();
}

async function deleteInvItem(setNumber) {
  if (!confirm(`Delete "${setNumber}" from inventory?`)) return;
  await sb.from("inventory").delete().eq("set_number", setNumber);
  toast("🗑️ Item removed"); await loadAll();
}

  const today = new Date().toISOString().split("T")[0];

  const daysDiff = d => Math.floor((new Date(today)-new Date(d))/86400000);
  const isOverdue = l => l.status==="Out"&&l.returnDate&&l.returnDate<today;

  const overdueList = state.loans.filter(isOverdue);
  const allOut = state.loans.filter(l=>l.status==="Out").flatMap(l=>l.sets||[]);

  html += `</div>`; // close padding div

  // ── RETURN MODAL ──
  if (state.returnModal) {
    const r = state.returnModal;

              <label style="background:white;color:#16a34a;border:2px solid #16a34a;border-radius:8px;padding:10px 6px;cursor:pointer;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;">

            ${loan.sets.map(s=>{
              const RETURN_STATUS=[{val:"Available",icon:"🟢",label:"Good — Available",color:"#16a34a",bg:"#f0fdf4"},{val:"Quarantine",icon:"🔬",label:"Quarantine",color:"#d97706",bg:"#fffbeb"},{val:"Parked",icon:"🅿️",label:"Park at Hospital",color:"#7c3aed",bg:"#f5f3ff"}];

                <div style="display:flex;flex-direction:column;gap:5px;">

        ${photos.length>1?`<div style="display:flex;gap:6px;margin-top:12px;justify-content:center;">
          ${photos.map((_,i)=>`<div onclick="setPhotoIdx(${i})" style="width:44px;height:44px;border-radius:6px;overflow:hidden;border:2px solid ${i===idx?"#60a5fa":"rgba(255,255,255,0.2)"};cursor:pointer;flex-shrink:0;">

  // ── REPAIR CONFIRM MODAL ──
  if (state.repairModal) {
    const rm = state.repairModal;
    html += `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1002;padding:16px;">
      <div style="background:white;border-radius:14px;padding:22px;width:100%;max-width:360px;">
        <div style="font-size:32px;text-align:center;margin-bottom:8px;">🔧</div>
        <div style="font-weight:800;font-size:15px;text-align:center;color:#0f2a5e;margin-bottom:6px;">Item Updated!</div>
        <div style="font-size:12px;color:#64748b;text-align:center;margin-bottom:16px;">This set is currently in 🔬 Quarantine</div>
        ${rm.snChanged?`<div style="background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:16px;">
          <div style="font-size:11px;color:#64748b;margin-bottom:6px;font-weight:600;">S/N UPDATED:</div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
            <span style="color:#94a3b8;">Old S/N:</span>

          <div style="display:flex;justify-content:space-between;font-size:12px;">
            <span style="color:#94a3b8;">New S/N:</span>
            <span style="color:#16a34a;font-weight:700;">${rm.newSn}</span>
          </div>
        </div>`:`<div style="background:#fffbeb;border-radius:10px;padding:10px;margin-bottom:16px;font-size:11px;color:#d97706;">ℹ️ No S/N change detected</div>`}
        <div style="font-size:13px;font-weight:700;color:#0f2a5e;margin-bottom:10px;">Has the issue been resolved?</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
          <button onclick="saveInvAsAvailable()" style="padding:12px;border-radius:8px;border:2px solid #16a34a;background:#f0fdf4;cursor:pointer;font-size:13px;font-weight:700;color:#16a34a;font-family:inherit;text-align:left;">

          <button onclick="saveInvKeepQuarantine()" style="padding:12px;border-radius:8px;border:2px solid #d97706;background:#fffbeb;cursor:pointer;font-size:13px;font-weight:700;color:#d97706;font-family:inherit;text-align:left;">

        <button onclick="state.repairModal=null;render()" style="width:100%;padding:10px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;font-family:inherit;">Cancel — Don't Save</button>

  // ── PARK MODAL ──
  if (state.parkModal) {
    const pm = state.parkModal;
    const isParked = pm.newStatus === "Parked";
    const isAvail = pm.newStatus === "Available";
    const isQuar = pm.newStatus === "Quarantine";
    const confirmColor = isParked?"#7c3aed":isAvail?"#16a34a":isQuar?"#d97706":"#1d4ed8";

    html += `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px;overflow-y:auto;">
      <div style="background:white;border-radius:14px;padding:20px;width:100%;max-width:360px;">

        <div style="font-size:12px;color:#64748b;margin-bottom:14px;">Set: <b>${pm.setNumber}</b> · Current: <b>${pm.currentStatus||"Available"}</b></div>

          <div style="display:flex;flex-direction:column;gap:6px;">
            ${Object.entries(AVAIL).filter(([k])=>k!=="Out").map(([key,cfg])=>`
              <button onclick="(function(e){e.stopPropagation();var sy=window.scrollY;state.parkModal.newStatus='${key}';render();window.scrollTo(0,sy);})(event)" style="padding:10px 12px;border:2px solid ${pm.newStatus===key?cfg.color:"#e2e8f0"};border-radius:8px;background:${pm.newStatus===key?cfg.bg:"white"};cursor:pointer;font-size:12px;font-weight:${pm.newStatus===key?700:500};color:${pm.newStatus===key?cfg.color:"#475569"};font-family:inherit;text-align:left;display:flex;align-items:center;gap:8px;">

                <div><div style="font-weight:700;">${cfg.label}</div>
                <div style="font-size:10px;opacity:0.8;">${key==="Available"?"Ready for loans":key==="Quarantine"?"Block — has issue":"Long term at hospital"}</div></div>
              </button>`).join("")}
          </div>
        </div>
        <div style="margin-bottom:12px;">
          <div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:4px;">YOUR NAME * (for record)</div>
          <input id="parkStaffName" placeholder="e.g. Ahmad / Lim / Carmen" value="${pm.staffName||""}" oninput="state.parkModal.staffName=this.value" style="width:100%;padding:10px;border-radius:7px;border:1px solid #cbd5e1;font-size:13px;box-sizing:border-box;font-family:inherit;"/>
        </div>
        ${isParked?`<div style="margin-bottom:10px;">
          <div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:4px;">HOSPITAL / LOCATION *</div>
          <input id="parkHospital" placeholder="e.g. Hospital Putrajaya" value="${pm.hospital||""}" oninput="state.parkModal.hospital=this.value" style="width:100%;padding:10px;border-radius:7px;border:1px solid #7c3aed;font-size:13px;box-sizing:border-box;font-family:inherit;"/>
        </div>

        ${isAvail?`<div style="background:#f0fdf4;border-radius:8px;padding:8px 10px;margin-bottom:12px;font-size:11px;color:#16a34a;">🟢 Set will become available for loans again.</div>`:""}

  html += `</div>`; // close app div
  document.getElementById("app").innerHTML = html;
}

// ── EVENT HANDLERS ───────────────────────────────────────
function switchTab(t) { state.tab=t; state.showForm=false; state.showInvForm=false; state.selectLogMode=false; state.selectedLogs=[]; render(); }
function updateSearch(v) { state.search=v; render(); }
function updateFStatus(v) { state.fStatus=v; render(); }
function updateInvSearch(v) { state.invSearch=v; render(); }
function updateInvCat(v) { state.invCat=v; render(); }
function updateInvAvail(v) { state.invAvail=v; render(); }
function toggleForm() { state.showForm=!state.showForm; if(!state.showForm){state.editId=null;state.form=emptyForm();} render(); }
function toggleExpand(id) { state.expandedId=state.expandedId===id?null:id; render(); }
function toggleCat(cat) {
  state.collapsedCats = state.collapsedCats||{};
  // Default is collapsed (true), toggle to false to open
  state.collapsedCats[cat] = state.collapsedCats[cat] === false ? true : false;
  render();
}

function updateFormField(name,val) { state.form[name]=val; }
function toggleSetDrop(i) {
  if(event) { event.stopPropagation(); event.preventDefault(); }
  const scrollY = window.scrollY;
  state.setDropOpen = state.setDropOpen||{};
  const wasOpen = state.setDropOpen[i];
  state.setDropOpen = {};
  state.setDropOpen[i] = !wasOpen;
  render();
  window.scrollTo(0, scrollY);
}
function toggleSetDropCat(i, cat) {
  if(event) { event.stopPropagation(); event.preventDefault(); }
  const key = i+"_"+encodeURIComponent(cat);
  const scrollY = window.scrollY;
  state.setDropCats = state.setDropCats||{};
  state.setDropCats[key] = !state.setDropCats[key];
  render();
  window.scrollTo(0, scrollY);
}
function toggleSetDropCatByKey(e, key) {
  if(e) { e.stopPropagation(); e.preventDefault(); }
  const scrollY = window.scrollY;
  state.setDropCats = state.setDropCats||{};
  state.setDropCats[key] = !state.setDropCats[key];
  render();
  window.scrollTo(0, scrollY);
}
function selectSet(i, setNum) {
  if(event) { event.stopPropagation(); event.preventDefault(); }
  const scrollY = window.scrollY;
  updateSet(i,'setNumber',setNum);
  state.setDropOpen=state.setDropOpen||{};
  state.setDropOpen[i]=false;
  state.setSearch=state.setSearch||{};
  state.setSearch[i]="";
  render();
  window.scrollTo(0, scrollY);
}
function updateSet(i,field,val) {
  if(field==="setNumber"){ const found=state.inventory.find(x=>x.setNumber===val); if(found){state.form.sets[i]={...state.form.sets[i],setNumber:val,description:found.description,brand:found.brand,sn:found.sn};}else{state.form.sets[i].setNumber=val;} }
  else state.form.sets[i][field]=val;
  render();
}

function compressPhoto(file, callback) {
  const MAX_WIDTH = 1024;
  const MAX_HEIGHT = 1024;
  const QUALITY = 0.7;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > MAX_WIDTH) { h = Math.round(h * MAX_WIDTH / w); w = MAX_WIDTH; }
      if (h > MAX_HEIGHT) { w = Math.round(w * MAX_HEIGHT / h); h = MAX_HEIGHT; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL("image/jpeg", QUALITY);
      const originalKB = Math.round(file.size / 1024);
      const compressedKB = Math.round(compressed.length * 0.75 / 1024);
      callback(compressed, originalKB, compressedKB);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handlePhoto(event) {
  const files = Array.from(event.target.files);
  files.forEach(file=>{
    compressPhoto(file, (dataUrl, originalKB, compressedKB)=>{
      state.form.photos.push({dataUrl, name:file.name, ts:new Date().toLocaleTimeString("en-MY"), compressedKB});
      render();
    });
  });
}

async function doQuickStatus(setNum, newStatus, hospital, since, staffName) {
  // Close modal immediately
  state.parkModal = null;
  render();

  const updateData = {
    availability: newStatus,
    consignment_hospital: hospital||null,
    consignment_since: since||null
  };
  if (newStatus === "Parked" && hospital) updateData.location = hospital;
  if (newStatus === "Available") {
    updateData.consignment_hospital = null;
    updateData.consignment_since = null;
    updateData.rectified_by = staffName||"Unknown";
    updateData.rectified_at = new Date().toISOString();
  } else {
    updateData.rectified_by = null;
    updateData.rectified_at = null;
  }
  await sb.from("inventory").update(updateData).eq("set_number", setNum);

  // Log to activity log
  const label = newStatus==="Available"?"🟢 Available":newStatus==="Parked"?"🅿️ Parked":"🔬 Quarantine";
  const noteText = newStatus==="Parked"?` @ ${hospital||"-"}`:newStatus==="Quarantine"?" — blocked for inspection":"";
  await sb.from("activity_log").insert({
    action: "Status Change",
    hospital: newStatus==="Parked"?(hospital||"-"):"-",
    surgeon: staffName||"Unknown",
    pic: staffName||"Unknown",
    set_numbers: `${setNum}: ${label}${noteText}`,
    set_count: 1,
    has_photo: false
  });

  toast(setNum+" → "+label+(hospital?" @ "+hospital:"")+(staffName?" by "+staffName:""));
  await loadAll();
}

function submitParkModal() {
  const pm = state.parkModal;

  if(hospitalEl) pm.hospital = hospitalEl.value.trim();
  if(!pm.newStatus){ alert("Please select a status!"); return; }
  if(!pm.staffName){ alert("Please enter your name!"); return; }
  if(pm.newStatus==="Parked" && !pm.hospital){ alert("Please enter hospital name!"); return; }
  doQuickStatus(pm.setNumber, pm.newStatus, pm.hospital, pm.since, pm.staffName);
}
